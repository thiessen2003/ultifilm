<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ultifilm – 2D Drawing Prototype</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    /* ─── CSS Variables ──────────────────────────────────────────── */
    :root {
      --blue:        #3543D0;
      --blue-light:  #4F5EE8;
      --blue-dark:   #2535B0;
      --red:         #E53535;
      --bg:          #EFEFEF;
      --surface:     #FFFFFF;
      --border:      #D0D4F0;
      --text:        #1A1A2E;
      --text-muted:  #6B6F8A;
      --annotation-active: rgba(53, 67, 208, 0.12);
      --toolbar-bg:  #FAFAFE;
      --shadow:      0 2px 12px rgba(53,67,208,0.10);
      --shadow-lg:   0 8px 32px rgba(53,67,208,0.16);
      --radius:      10px;
      --radius-sm:   6px;
    }

    /* ─── Reset ─────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ─── Top Nav ────────────────────────────────────────────────── */
    header {
      background: var(--blue);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      height: 52px;
      flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(0,0,0,0.18);
    }
    .nav-home {
      background: none;
      border: none;
      cursor: pointer;
      color: white;
      opacity: 0.85;
      padding: 6px;
      border-radius: var(--radius-sm);
      transition: opacity 0.15s, background 0.15s;
      display: flex;
      align-items: center;
    }
    .nav-home:hover { opacity: 1; background: rgba(255,255,255,0.12); }
    .nav-title {
      font-size: 22px;
      font-weight: 600;
      color: white;
      letter-spacing: -0.3px;
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
    }
    .nav-right { display: flex; align-items: center; gap: 10px; }

    /* Annotations toggle */
    .annotation-toggle {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 13px;
      color: rgba(255,255,255,0.9);
      font-weight: 500;
    }
    .toggle-pill {
      position: relative;
      width: 46px;
      height: 24px;
      background: var(--red);
      border-radius: 12px;
      cursor: pointer;
      transition: background 0.2s;
      border: none;
      display: flex;
      align-items: center;
    }
    .toggle-pill.on { background: #22c55e; }
    .toggle-knob {
      position: absolute;
      left: 3px;
      width: 18px; height: 18px;
      background: white;
      border-radius: 50%;
      transition: left 0.2s;
      box-shadow: 0 1px 4px rgba(0,0,0,0.2);
    }
    .toggle-pill.on .toggle-knob { left: 25px; }
    .toggle-label { font-size: 11px; font-weight: 700; color: white; position: absolute; right: 5px; }
    .toggle-pill.on .toggle-label { right: auto; left: 5px; }

    /* Save button */
    .btn-save {
      background: #22c55e;
      color: white;
      border: none;
      padding: 6px 16px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      font-family: 'DM Sans', sans-serif;
    }
    .btn-save:hover { background: #16a34a; }
    .btn-save:active { transform: scale(0.97); }

    /* ─── Main Layout ────────────────────────────────────────────── */
    .main {
      display: flex;
      flex: 1;
      overflow: hidden;
      height: calc(100vh - 52px);
    }

    /* ─── Left Sidebar ───────────────────────────────────────────── */
    .sidebar {
      width: 200px;
      flex-shrink: 0;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 16px 12px;
      gap: 8px;
      overflow-y: auto;
    }
    .sidebar-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 4px;
    }
    .play-item {
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 8px 10px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }
    .play-item:hover { border-color: var(--blue-light); background: var(--annotation-active); }
    .play-item.active { border-color: var(--blue); background: var(--annotation-active); }
    .play-name { font-size: 13px; font-weight: 500; color: var(--text); }
    .play-time { font-size: 11px; color: var(--text-muted); font-family: 'DM Mono', monospace; }

    .sidebar-divider { height: 1px; background: var(--border); margin: 4px 0; }

    .btn-new-play {
      background: var(--blue);
      color: white;
      border: none;
      border-radius: var(--radius-sm);
      padding: 8px 0;
      width: 100%;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      font-family: 'DM Sans', sans-serif;
    }
    .btn-new-play:hover { background: var(--blue-light); }

    .btn-all-plays {
      background: var(--surface);
      color: var(--blue);
      border: 1.5px solid var(--blue);
      border-radius: var(--radius-sm);
      padding: 8px 0;
      width: 100%;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      font-family: 'DM Sans', sans-serif;
      margin-top: auto;
    }
    .btn-all-plays:hover { background: var(--annotation-active); }

    /* ─── Center: Video + Canvas ─────────────────────────────────── */
    .center {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--bg);
    }
    .game-title {
      font-size: 17px;
      font-weight: 600;
      color: var(--text);
      padding: 10px 16px 6px;
      flex-shrink: 0;
    }

    /* Video + canvas container */
    .video-wrapper {
      position: relative;
      flex: 1;
      overflow: hidden;
      background: #000;
      margin: 0 16px;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }
    /* The game still frame */
    .video-frame {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      border-radius: var(--radius);
    }
    /* Canvas sits exactly on top of the video */
    #drawCanvas {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      border-radius: var(--radius);
      /* cursor changes based on active tool */
    }
    #drawCanvas.tool-pen        { cursor: crosshair; }
    #drawCanvas.tool-marker     { cursor: crosshair; }
    #drawCanvas.tool-dashed     { cursor: crosshair; }
    #drawCanvas.tool-calligraphy{ cursor: crosshair; }
    #drawCanvas.tool-spray      { cursor: crosshair; }
    #drawCanvas.tool-eraser     { cursor: none; }
    #drawCanvas.tool-text       { cursor: text; }
    #drawCanvas.tool-arrow,
    #drawCanvas.tool-circle,
    #drawCanvas.tool-rect,
    #drawCanvas.tool-triangle   { cursor: crosshair; }

    /* Eraser cursor circle */
    #eraserCursor {
      position: absolute;
      border: 2px solid rgba(255,255,255,0.8);
      border-radius: 50%;
      pointer-events: none;
      display: none;
      transform: translate(-50%, -50%);
      box-shadow: 0 0 0 1px rgba(0,0,0,0.4);
      z-index: 5;
    }

    /* "Annotations off" overlay */
    .annotations-off-overlay {
      position: absolute;
      inset: 0;
      border-radius: var(--radius);
      pointer-events: none;
      display: none;
    }
    .annotations-off-overlay.visible { display: block; }

    /* Scrubber bar row */
    .scrubber-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 16px;
      flex-shrink: 0;
    }
    .time-label {
      font-size: 11px;
      font-family: 'DM Mono', monospace;
      color: var(--text-muted);
      min-width: 42px;
    }
    .scrubber {
      flex: 1;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      position: relative;
      cursor: pointer;
    }
    .scrubber-fill {
      height: 100%;
      width: 17%;
      background: var(--blue);
      border-radius: 2px;
    }
    .scrubber-thumb {
      position: absolute;
      top: 50%;
      left: 17%;
      transform: translate(-50%, -50%);
      width: 12px; height: 12px;
      background: var(--blue);
      border-radius: 50%;
      border: 2px solid white;
      box-shadow: 0 1px 4px rgba(0,0,0,0.2);
    }
    .playback-controls {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .ctrl-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-muted);
      padding: 4px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      transition: color 0.15s, background 0.15s;
    }
    .ctrl-btn:hover { color: var(--blue); background: var(--annotation-active); }
    .ctrl-btn.play-btn {
      background: var(--blue);
      color: white;
      border-radius: 50%;
      width: 28px; height: 28px;
      justify-content: center;
    }
    .ctrl-btn.play-btn:hover { background: var(--blue-light); }

    /* Annotation note below video */
    .annotation-note {
      margin: 6px 16px 10px;
      background: #F0F1FA;
      border-radius: var(--radius-sm);
      padding: 10px 12px;
      flex-shrink: 0;
    }
    .annotation-note-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 2px;
    }
    .annotation-note-body {
      font-size: 12px;
      color: var(--text-muted);
      line-height: 1.5;
    }

    /* ─── Right Toolbar ──────────────────────────────────────────── */
    .toolbar {
      width: 56px;
      flex-shrink: 0;
      background: var(--toolbar-bg);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 12px 0;
      gap: 4px;
    }
    .tool-btn {
      width: 36px; height: 36px;
      border: none;
      background: none;
      border-radius: var(--radius-sm);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      transition: background 0.15s, color 0.15s;
      position: relative;
    }
    .tool-btn:hover { background: var(--annotation-active); color: var(--blue); }
    .tool-btn.active {
      background: var(--blue);
      color: white;
    }
    .tool-btn svg { width: 18px; height: 18px; }

    /* Tooltip */
    .tool-btn::after {
      content: attr(data-tip);
      position: absolute;
      right: calc(100% + 8px);
      top: 50%;
      transform: translateY(-50%);
      background: var(--text);
      color: white;
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 4px;
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s;
      font-family: 'DM Sans', sans-serif;
    }
    .tool-btn:hover::after { opacity: 1; }

    .toolbar-divider {
      width: 28px;
      height: 1px;
      background: var(--border);
      margin: 4px 0;
    }

    /* Color swatches */
    .color-swatch {
      width: 20px; height: 20px;
      border-radius: 50%;
      border: 2.5px solid transparent;
      cursor: pointer;
      transition: transform 0.15s, border-color 0.15s;
      flex-shrink: 0;
    }
    .color-swatch:hover { transform: scale(1.15); }
    .color-swatch.active { border-color: var(--text); }

    /* Size slider label */
    .size-label {
      font-size: 10px;
      color: var(--text-muted);
      font-family: 'DM Mono', monospace;
      text-align: center;
      margin-top: 2px;
    }
    input[type=range].stroke-size {
      writing-mode: vertical-lr;
      direction: rtl;
      width: 4px;
      height: 60px;
      cursor: pointer;
      accent-color: var(--blue);
    }

    /* ─── Toast ──────────────────────────────────────────────────── */
    #toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(60px);
      background: var(--text);
      color: white;
      padding: 8px 20px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 500;
      pointer-events: none;
      transition: transform 0.25s ease, opacity 0.25s ease;
      opacity: 0;
      z-index: 100;
    }
    #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

    /* ─── Undo/Redo row ──────────────────────────────────────────── */
    .undo-row {
      display: flex;
      gap: 4px;
      margin-top: 4px;
    }
    .undo-btn {
      flex: 1;
      background: none;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-muted);
      font-size: 11px;
      cursor: pointer;
      padding: 3px 0;
      font-family: 'DM Sans', sans-serif;
      transition: background 0.15s, color 0.15s;
    }
    .undo-btn:hover { background: var(--annotation-active); color: var(--blue); }
  </style>
</head>
<body>

<!-- ─── NAV ─────────────────────────────────────────────────────── -->
<header>
  <button class="nav-home" title="Home">
    <!-- House icon -->
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
    </svg>
  </button>
  <span class="nav-title">Ultifilm</span>
  <div class="nav-right">
    <div class="annotation-toggle">
      <span>Annotations:</span>
      <button class="toggle-pill on" id="annotToggle" title="Toggle annotations">
        <span class="toggle-knob"></span>
        <span class="toggle-label">On</span>
      </button>
    </div>
    <button class="btn-save" id="btnSave">Save</button>
  </div>
</header>

<!-- ─── MAIN ────────────────────────────────────────────────────── -->
<div class="main">

  <!-- LEFT SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-title">Plays</div>
    <div class="play-item active" data-play="barnyard">
      <div class="play-name">Barnyard</div>
      <div class="play-time">00:05:31</div>
    </div>
    <div class="play-item" data-play="infinity">
      <div class="play-name">Infinity</div>
      <div class="play-time">00:10:12</div>
    </div>
    <div class="play-item" data-play="wall">
      <div class="play-name">Wall</div>
      <div class="play-time">00:12:24</div>
    </div>
    <div class="sidebar-divider"></div>
    <button class="btn-new-play">New Play</button>
    <div style="flex:1"></div>
    <button class="btn-all-plays">All Plays</button>
  </aside>

  <!-- CENTER -->
  <div class="center">
    <div class="game-title">Pennsylvania vs. Tufts</div>

    <!-- Video + Canvas -->
    <div class="video-wrapper" id="videoWrapper">
      <!--
        SWAP THIS SRC for a real screenshot/frame from the game.
        For the prototype we use a green gradient to simulate the field.
      -->
      <svg id="fieldSvg" xmlns="http://www.w3.org/2000/svg"
           style="position:absolute;inset:0;width:100%;height:100%;display:block;border-radius:10px;">
        <defs>
          <linearGradient id="fieldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%"   stop-color="#4a7c3f"/>
            <stop offset="50%"  stop-color="#3d6b34"/>
            <stop offset="100%" stop-color="#2e5026"/>
          </linearGradient>
        </defs>
        <rect width="100%" height="100%" fill="url(#fieldGrad)"/>
        <!-- Field lines -->
        <rect x="5%" y="6%" width="90%" height="88%" fill="none" stroke="white" stroke-width="2" opacity="0.6"/>
        <!-- Center circle -->
        <ellipse cx="50%" cy="50%" rx="12%" ry="16%" fill="none" stroke="white" stroke-width="1.5" opacity="0.5"/>
        <!-- End zones -->
        <rect x="5%" y="6%" width="90%" height="13%" fill="white" opacity="0.08"/>
        <rect x="5%" y="81%" width="90%" height="13%" fill="white" opacity="0.08"/>
        <!-- Yard lines -->
        <line x1="5%" y1="30%" x2="95%" y2="30%" stroke="white" stroke-width="1" opacity="0.3"/>
        <line x1="5%" y1="50%" x2="95%" y2="50%" stroke="white" stroke-width="1" opacity="0.3"/>
        <line x1="5%" y1="70%" x2="95%" y2="70%" stroke="white" stroke-width="1" opacity="0.3"/>
        <!-- Players rendered dynamically by JS -->
        <g id="playersGroup"></g>
        <!-- Disc rendered dynamically -->
        <ellipse id="discEl" rx="6" ry="4" fill="white" stroke="#ccc" stroke-width="1"/>
        <!-- Scoreboard bar -->
        <rect x="0" y="85%" width="100%" height="15%" fill="#111" opacity="0.85"/>
        <text x="10%" y="93%" fill="white" font-size="13" font-family="monospace" font-weight="bold">TUFTS  7</text>
        <text x="50%" y="93%" fill="white" font-size="13" font-family="monospace" font-weight="bold" text-anchor="middle">PENNSYLVANIA  5</text>
        <text x="85%" y="93%" fill="white" font-size="13" font-family="monospace" font-weight="bold" text-anchor="middle">1ST | 60:05</text>
      </svg>

      <!-- THE DRAWING CANVAS — sits on top of everything -->
      <canvas id="drawCanvas" class="tool-pen"></canvas>

      <!-- Eraser cursor circle -->
      <div id="eraserCursor"></div>

      <!-- Annotations-off dimmer -->
      <div class="annotations-off-overlay" id="annotOverlay"></div>
    </div>

    <!-- Scrubber -->
    <div class="scrubber-row">
      <span class="time-label">00:15:45</span>
      <div class="scrubber">
        <div class="scrubber-fill"></div>
        <div class="scrubber-thumb"></div>
      </div>
      <div class="playback-controls">
        <!-- Rewind -->
        <button class="ctrl-btn" title="Rewind">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M11 18V6l-8.5 6 8.5 6zm.5-6l8.5 6V6l-8.5 6z"/></svg>
        </button>
        <!-- Play -->
        <button class="ctrl-btn play-btn" title="Play/Pause">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
        </button>
        <!-- Pause -->
        <button class="ctrl-btn" title="Pause">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
        </button>
        <!-- Fast Forward -->
        <button class="ctrl-btn" title="Fast Forward">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M4 18l8.5-6L4 6v12zm9-12v12l8.5-6L13 6z"/></svg>
        </button>
      </div>
      <span class="time-label" style="text-align:right">01:41:36</span>
    </div>

    <!-- Annotation note -->
    <div class="annotation-note">
      <div class="annotation-note-title">Barnyard Example</div>
      <div class="annotation-note-body">Notice how the players are positioned in relation to the disc. There should only be about 10 yards of space between handlers and cutters.</div>
    </div>
  </div>

  <!-- RIGHT TOOLBAR -->
  <div class="toolbar" id="toolbar">

    <!-- Pen -->
    <button class="tool-btn active" data-tool="pen" data-tip="Pen" title="Pen">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/>
      </svg>
    </button>

    <!-- Marker (semi-transparent thick) -->
    <button class="tool-btn" data-tool="marker" data-tip="Marker" title="Marker">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 21l1.9-5.7a8.5 8.5 0 1 1 3.8 3.8z"/>
      </svg>
    </button>

    <!-- Dashed pen -->
    <button class="tool-btn" data-tool="dashed" data-tip="Dashed" title="Dashed line">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <line x1="3" y1="12" x2="7" y2="12"/><line x1="10" y1="12" x2="14" y2="12"/><line x1="17" y1="12" x2="21" y2="12"/>
      </svg>
    </button>

    <!-- Calligraphy pen (angled flat stroke) -->
    <button class="tool-btn" data-tool="calligraphy" data-tip="Calligraphy" title="Calligraphy">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 20L20 4"/><path d="M4 20l4-1-3-3z"/>
      </svg>
    </button>

    <!-- Spray -->
    <button class="tool-btn" data-tool="spray" data-tip="Spray" title="Spray paint">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <circle cx="8" cy="15" r="4"/><line x1="12" y1="15" x2="20" y2="15"/><line x1="17" y1="9" x2="17" y2="13"/><line x1="14" y1="10" x2="16" y2="12"/><line x1="20" y1="10" x2="18" y2="12"/>
      </svg>
    </button>

    <!-- Eraser -->
    <button class="tool-btn" data-tool="eraser" data-tip="Eraser" title="Eraser">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 20H7L3 16l9.5-9.5 7.5 7.5-2.5 2.5"/><path d="M6.5 17.5l4-4"/>
      </svg>
    </button>

    <!-- Text -->
    <button class="tool-btn" data-tool="text" data-tip="Text" title="Text">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="4 7 4 4 20 4 20 7"/><line x1="9" y1="20" x2="15" y2="20"/><line x1="12" y1="4" x2="12" y2="20"/>
      </svg>
    </button>

    <div class="toolbar-divider"></div>

    <!-- Arrow -->
    <button class="tool-btn" data-tool="arrow" data-tip="Arrow" title="Arrow">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>
      </svg>
    </button>

    <!-- Circle -->
    <button class="tool-btn" data-tool="circle" data-tip="Circle" title="Circle">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="9"/>
      </svg>
    </button>

    <!-- Rectangle -->
    <button class="tool-btn" data-tool="rect" data-tip="Rectangle" title="Rectangle">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
      </svg>
    </button>

    <!-- Triangle -->
    <button class="tool-btn" data-tool="triangle" data-tip="Triangle" title="Triangle">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="12 2 2 22 22 22"/>
      </svg>
    </button>

    <div class="toolbar-divider"></div>

    <!-- Color swatches -->
    <div class="color-swatch active" data-color="#E53535" style="background:#E53535" title="Red"></div>
    <div class="color-swatch" data-color="#3543D0" style="background:#3543D0" title="Blue"></div>
    <div class="color-swatch" data-color="#22c55e" style="background:#22c55e" title="Green"></div>
    <div class="color-swatch" data-color="#f59e0b" style="background:#f59e0b" title="Yellow"></div>
    <div class="color-swatch" data-color="#ffffff" style="background:#ffffff;border:1.5px solid #ccc" title="White"></div>
    <div class="color-swatch" data-color="#111111" style="background:#111111" title="Black"></div>

    <div class="toolbar-divider"></div>

    <!-- Stroke size -->
    <span class="size-label" id="sizeLabel">3px</span>
    <input type="range" class="stroke-size" id="strokeSize" min="1" max="20" value="3" title="Stroke size"/>

    <div class="toolbar-divider"></div>

    <!-- Undo / Redo -->
    <div class="undo-row">
      <button class="undo-btn" id="btnUndo" title="Undo">↩</button>
      <button class="undo-btn" id="btnRedo" title="Redo">↪</button>
    </div>

    <!-- Clear all -->
    <button class="tool-btn" data-tip="Clear all" title="Clear all" id="btnClear" style="margin-top:4px">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:18px;height:18px">
        <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/>
      </svg>
    </button>

  </div>
</div>

<!-- Toast -->
<div id="toast">Saved!</div>

<!-- ─── SCRIPT ─────────────────────────────────────────────────────── -->
<script>
  // ── State ─────────────────────────────────────────────────────────
  let activeTool   = 'pen';
  let activeColor  = '#E53535';
  let strokeWidth  = 3;
  let annotationsOn = true;

  // Undo/redo stacks store ImageData snapshots
  let undoStack = [];
  let redoStack = [];

  // Drawing state
  let isDrawing = false;
  let startX = 0, startY = 0;
  let snapshot = null; // snapshot before drawing shape

  // Text tool state
  let textInput = null;

  // ── Canvas setup ───────────────────────────────────────────────────
  const canvas  = document.getElementById('drawCanvas');
  const ctx     = canvas.getContext('2d');
  const wrapper = document.getElementById('videoWrapper');

  function resizeCanvas() {
    // Save current drawing
    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    canvas.width  = wrapper.clientWidth;
    canvas.height = wrapper.clientHeight;
    ctx.putImageData(imageData, 0, 0);
  }
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);

  // ── Tool selection ─────────────────────────────────────────────────
  document.querySelectorAll('.tool-btn[data-tool]').forEach(btn => {
    btn.addEventListener('click', () => {
      activeTool = btn.dataset.tool;
      document.querySelectorAll('.tool-btn[data-tool]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      canvas.className = 'tool-' + activeTool;
      if (activeTool !== 'eraser') eraserCursor.style.display = 'none';
    });
  });

  // ── Color swatches ─────────────────────────────────────────────────
  document.querySelectorAll('.color-swatch').forEach(swatch => {
    swatch.addEventListener('click', () => {
      activeColor = swatch.dataset.color;
      document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
      swatch.classList.add('active');
    });
  });

  // ── Stroke size ────────────────────────────────────────────────────
  const sizeSlider = document.getElementById('strokeSize');
  const sizeLabel  = document.getElementById('sizeLabel');

  // ── Eraser cursor ──────────────────────────────────────────────────
  const eraserCursor = document.getElementById('eraserCursor');

  function updateEraserCursor(e) {
    if (activeTool !== 'eraser') { eraserCursor.style.display = 'none'; return; }
    const rect = wrapper.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    const x = clientX - rect.left;
    const y = clientY - rect.top;
    const size = strokeWidth * 8;
    eraserCursor.style.display = 'block';
    eraserCursor.style.left    = x + 'px';
    eraserCursor.style.top     = y + 'px';
    eraserCursor.style.width   = size + 'px';
    eraserCursor.style.height  = size + 'px';
  }

  canvas.addEventListener('mousemove', updateEraserCursor);
  canvas.addEventListener('mouseleave', () => { eraserCursor.style.display = 'none'; });

  // Update eraser cursor size when slider changes
  sizeSlider.addEventListener('input', () => {
    strokeWidth = parseInt(sizeSlider.value);
    sizeLabel.textContent = strokeWidth + 'px';
    if (activeTool === 'eraser') {
      const size = strokeWidth * 8;
      eraserCursor.style.width  = size + 'px';
      eraserCursor.style.height = size + 'px';
    }
  });

  // ── Annotations toggle ─────────────────────────────────────────────
  const annotToggle  = document.getElementById('annotToggle');
  const annotOverlay = document.getElementById('annotOverlay');
  annotToggle.addEventListener('click', () => {
    annotationsOn = !annotationsOn;
    annotToggle.classList.toggle('on', annotationsOn);
    annotToggle.querySelector('.toggle-label').textContent = annotationsOn ? 'On' : 'Off';
    canvas.style.display       = annotationsOn ? 'block' : 'none';
    annotOverlay.classList.toggle('visible', !annotationsOn);
  });

  // ── Save ──────────────────────────────────────────────────────────
  document.getElementById('btnSave').addEventListener('click', () => {
    showToast('Saved!');
  });

  // ── Clear ─────────────────────────────────────────────────────────
  document.getElementById('btnClear').addEventListener('click', () => {
    saveUndo();
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    redoStack = [];
    showToast('Canvas cleared');
  });

  // ── Undo / Redo ────────────────────────────────────────────────────
  document.getElementById('btnUndo').addEventListener('click', undo);
  document.getElementById('btnRedo').addEventListener('click', redo);

  function saveUndo() {
    undoStack.push(ctx.getImageData(0, 0, canvas.width, canvas.height));
    if (undoStack.length > 40) undoStack.shift();
    redoStack = [];
  }
  function undo() {
    if (!undoStack.length) return showToast('Nothing to undo');
    redoStack.push(ctx.getImageData(0, 0, canvas.width, canvas.height));
    ctx.putImageData(undoStack.pop(), 0, 0);
  }
  function redo() {
    if (!redoStack.length) return showToast('Nothing to redo');
    undoStack.push(ctx.getImageData(0, 0, canvas.width, canvas.height));
    ctx.putImageData(redoStack.pop(), 0, 0);
  }

  // Keyboard shortcuts
  document.addEventListener('keydown', e => {
    if ((e.metaKey || e.ctrlKey) && e.key === 'z') { e.preventDefault(); undo(); }
    if ((e.metaKey || e.ctrlKey) && e.key === 'y') { e.preventDefault(); redo(); }
    if ((e.metaKey || e.ctrlKey) && e.shiftKey && e.key === 'z') { e.preventDefault(); redo(); }
  });

  // ── Drawing helpers ────────────────────────────────────────────────
  function getPos(e) {
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width  / rect.width;
    const scaleY = canvas.height / rect.height;
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    return {
      x: (clientX - rect.left) * scaleX,
      y: (clientY - rect.top)  * scaleY
    };
  }

  function applyStyle() {
    ctx.strokeStyle = activeColor;
    ctx.fillStyle   = activeColor;
    ctx.lineCap     = 'round';
    ctx.lineJoin    = 'round';
    ctx.globalAlpha = 1;
    ctx.setLineDash([]);

    switch(activeTool) {
      case 'marker':
        ctx.lineWidth   = strokeWidth * 3;
        ctx.globalAlpha = 0.35;
        ctx.lineCap     = 'square';
        break;
      case 'dashed':
        ctx.lineWidth = strokeWidth;
        ctx.setLineDash([strokeWidth * 4, strokeWidth * 2]);
        break;
      case 'calligraphy':
        // Calligraphy: wide flat stroke via a rotated rectangle approach — we set a wide lineWidth and butt cap
        ctx.lineWidth = strokeWidth * 4;
        ctx.lineCap   = 'butt';
        ctx.globalAlpha = 0.85;
        break;
      case 'spray':
        ctx.lineWidth = 1;
        break;
      default: // pen
        ctx.lineWidth = strokeWidth;
    }
  }

  // ── Pointer Events ─────────────────────────────────────────────────
  canvas.addEventListener('mousedown',  onDown);
  canvas.addEventListener('mousemove',  onMove);
  canvas.addEventListener('mouseup',    onUp);
  canvas.addEventListener('mouseleave', onUp);
  canvas.addEventListener('touchstart', e => { e.preventDefault(); onDown(e); }, { passive: false });
  canvas.addEventListener('touchmove',  e => { e.preventDefault(); onMove(e); }, { passive: false });
  canvas.addEventListener('touchend',   e => { e.preventDefault(); onUp(e);   }, { passive: false });

  function onDown(e) {
    if (!annotationsOn) return;

    // Text tool: place input
    if (activeTool === 'text') {
      const pos = getPos(e);
      placeTextInput(pos.x, pos.y);
      return;
    }

    saveUndo();
    isDrawing = true;
    const pos = getPos(e);
    startX = pos.x;
    startY = pos.y;

    if (['pen', 'marker', 'dashed', 'calligraphy', 'spray', 'eraser'].includes(activeTool)) {
      ctx.beginPath();
      ctx.moveTo(startX, startY);
    } else {
      // For shapes: capture snapshot to redraw cleanly on each move
      snapshot = ctx.getImageData(0, 0, canvas.width, canvas.height);
    }
  }

  function onMove(e) {
    if (!isDrawing || !annotationsOn) return;
    const pos = getPos(e);

    if (['pen', 'marker', 'dashed', 'calligraphy'].includes(activeTool)) {
      applyStyle();
      ctx.lineTo(pos.x, pos.y);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(pos.x, pos.y);
    } else if (activeTool === 'spray') {
      // Spray: scatter random dots around cursor
      applyStyle();
      const density = 20;
      const radius  = strokeWidth * 5;
      ctx.globalAlpha = 0.6;
      for (let i = 0; i < density; i++) {
        const angle = Math.random() * Math.PI * 2;
        const r     = Math.random() * radius;
        const sx    = pos.x + r * Math.cos(angle);
        const sy    = pos.y + r * Math.sin(angle);
        ctx.fillStyle = activeColor;
        ctx.beginPath();
        ctx.arc(sx, sy, Math.random() * 1.5 + 0.5, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
    } else if (activeTool === 'eraser') {
      const eraserSize = strokeWidth * 8;
      ctx.globalAlpha = 1;
      ctx.clearRect(pos.x - eraserSize / 2, pos.y - eraserSize / 2, eraserSize, eraserSize);
    } else {
      // Shape preview: restore snapshot then draw shape
      ctx.putImageData(snapshot, 0, 0);
      drawShape(activeTool, startX, startY, pos.x, pos.y);
    }
  }

  function onUp(e) {
    if (!isDrawing) return;
    isDrawing = false;
    ctx.globalAlpha = 1;

    if (['pen','marker','dashed','calligraphy','spray','eraser'].includes(activeTool)) {
      ctx.beginPath();
      ctx.setLineDash([]);
    } else if (activeTool !== 'text') {
      const pos = getPos(e);
      ctx.putImageData(snapshot, 0, 0);
      drawShape(activeTool, startX, startY, pos.x, pos.y);
    }
  }

  function drawShape(tool, x1, y1, x2, y2) {
    applyStyle();
    ctx.globalAlpha = 1;
    ctx.beginPath();

    switch(tool) {
      case 'arrow': {
        const dx = x2 - x1, dy = y2 - y1;
        const angle = Math.atan2(dy, dx);
        const headLen = Math.max(12, strokeWidth * 4);
        ctx.moveTo(x1, y1);
        ctx.lineTo(x2, y2);
        ctx.stroke();
        // Arrowhead
        ctx.beginPath();
        ctx.moveTo(x2, y2);
        ctx.lineTo(x2 - headLen * Math.cos(angle - Math.PI/6), y2 - headLen * Math.sin(angle - Math.PI/6));
        ctx.moveTo(x2, y2);
        ctx.lineTo(x2 - headLen * Math.cos(angle + Math.PI/6), y2 - headLen * Math.sin(angle + Math.PI/6));
        ctx.stroke();
        break;
      }
      case 'circle': {
        const rx = (x2 - x1) / 2, ry = (y2 - y1) / 2;
        ctx.ellipse(x1 + rx, y1 + ry, Math.abs(rx), Math.abs(ry), 0, 0, Math.PI * 2);
        ctx.stroke();
        break;
      }
      case 'rect': {
        ctx.strokeRect(x1, y1, x2 - x1, y2 - y1);
        break;
      }
      case 'triangle': {
        ctx.moveTo((x1 + x2) / 2, y1);
        ctx.lineTo(x2, y2);
        ctx.lineTo(x1, y2);
        ctx.closePath();
        ctx.stroke();
        break;
      }
    }
  }

  // ── Text tool ──────────────────────────────────────────────────────
  function placeTextInput(x, y) {
    // Remove any existing text input
    if (textInput) textInput.remove();

    const rect  = canvas.getBoundingClientRect();
    const scaleX = rect.width  / canvas.width;
    const scaleY = rect.height / canvas.height;

    textInput = document.createElement('input');
    textInput.type = 'text';
    textInput.placeholder = 'Type here…';
    Object.assign(textInput.style, {
      position:    'absolute',
      left:        (x * scaleX + rect.left - wrapper.getBoundingClientRect().left) + 'px',
      top:         (y * scaleY + rect.top  - wrapper.getBoundingClientRect().top)  + 'px',
      background:  'rgba(255,255,255,0.15)',
      border:      '1.5px dashed ' + activeColor,
      color:       activeColor,
      fontSize:    Math.max(14, strokeWidth * 4) + 'px',
      fontFamily:  "'DM Sans', sans-serif",
      fontWeight:  '600',
      padding:     '2px 6px',
      borderRadius:'4px',
      outline:     'none',
      minWidth:    '80px',
      zIndex:      '10',
      backdropFilter: 'blur(2px)',
    });

    wrapper.style.position = 'relative';
    wrapper.appendChild(textInput);
    textInput.focus();

    function commitText() {
      if (textInput && textInput.value.trim()) {
        saveUndo();
        applyStyle();
        ctx.globalAlpha = 1;
        ctx.font = `600 ${Math.max(14, strokeWidth * 4)}px 'DM Sans', sans-serif`;
        ctx.fillStyle = activeColor;
        ctx.fillText(textInput.value.trim(), x, y + Math.max(14, strokeWidth * 4));
      }
      if (textInput) { textInput.remove(); textInput = null; }
    }

    textInput.addEventListener('keydown', e => {
      if (e.key === 'Enter') commitText();
      if (e.key === 'Escape') { textInput.remove(); textInput = null; }
    });
    textInput.addEventListener('blur', commitText);
  }

  // ── Toast ──────────────────────────────────────────────────────────
  const toast = document.getElementById('toast');
  let toastTimer;
  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.classList.remove('show'), 2000);
  }

  // ── Formations ────────────────────────────────────────────────────
  // Each formation: offense (blue) and defense (red) player positions as [cx%, cy%]
  // Plus disc position and annotation note
  const formations = {
    barnyard: {
      note: { title: 'Barnyard Example', body: 'Notice how the players are positioned in relation to the disc. There should only be about 10 yards of space between handlers and cutters.' },
      disc: [51, 44],
      offense: [[35,42],[55,38],[65,48],[45,55],[28,58],[72,36],[50,44]],
      defense: [[38,40],[58,36],[68,46],[48,53],[30,56],[74,34],[52,42]]
    },
    infinity: {
      // Infinity: vertical stack offense, poaching zone defense
      note: { title: 'Infinity Formation', body: 'Vertical stack with cutters lined up center-field. Handlers initiate from the back. Defense plays man with a poach in the lane.' },
      disc: [50, 65],
      offense: [[50,65],[50,55],[50,45],[50,35],[35,60],[65,60],[50,72]],
      defense: [[52,63],[52,53],[52,43],[52,33],[37,58],[67,58],[48,70]]
    },
    wall: {
      // Wall: horizontal spread offense, zone defense wall
      note: { title: 'Wall Defense', body: 'Defense sets a horizontal wall across mid-field to force sideline. Offense tries to swing quickly and punch through the seam.' },
      disc: [30, 50],
      offense: [[30,50],[45,48],[60,46],[75,44],[35,62],[55,60],[20,58]],
      defense: [[25,40],[38,40],[52,40],[66,40],[78,40],[32,52],[60,52]]
    }
  };

  function renderFormation(playKey) {
    const f = formations[playKey];
    const svg = document.getElementById('fieldSvg');
    const group = document.getElementById('playersGroup');
    const disc  = document.getElementById('discEl');

    // Clear old players
    group.innerHTML = '';

    // Draw offense
    f.offense.forEach(([cx, cy]) => {
      const c = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
      c.setAttribute('cx', cx + '%');
      c.setAttribute('cy', cy + '%');
      c.setAttribute('r', '10');
      c.setAttribute('fill', '#4F5EE8');
      c.setAttribute('stroke', 'white');
      c.setAttribute('stroke-width', '2');
      group.appendChild(c);
    });

    // Draw defense
    f.defense.forEach(([cx, cy]) => {
      const c = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
      c.setAttribute('cx', cx + '%');
      c.setAttribute('cy', cy + '%');
      c.setAttribute('r', '10');
      c.setAttribute('fill', '#E53535');
      c.setAttribute('stroke', 'white');
      c.setAttribute('stroke-width', '2');
      group.appendChild(c);
    });

    // Move disc
    disc.setAttribute('cx', f.disc[0] + '%');
    disc.setAttribute('cy', f.disc[1] + '%');

    // Update annotation note
    document.querySelector('.annotation-note-title').textContent = f.note.title;
    document.querySelector('.annotation-note-body').textContent  = f.note.body;
  }

  // Render default on load
  renderFormation('barnyard');

  // ── Play item clicks ───────────────────────────────────────────────
  document.querySelectorAll('.play-item').forEach(item => {
    item.addEventListener('click', () => {
      document.querySelectorAll('.play-item').forEach(i => i.classList.remove('active'));
      item.classList.add('active');
      const play = item.dataset.play;
      if (play) renderFormation(play);
      // Clear canvas when switching plays
      saveUndo();
      ctx.clearRect(0, 0, canvas.width, canvas.height);
    });
  });
</script>
</body>
</html>
